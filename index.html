<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Demo App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            font-size: 18px;
        }

        .badge {
            margin-top: 20px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            display: inline-block;
        }

        footer {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚀 DevOps CI/CD Demo</h1>

    <p>
        This page was deployed automatically using 
        <b>Jenkins Pipeline</b>.
    </p>

    <div class="badge">
        Build Successful ✔
    </div>

    <footer>
        Jenkins | GitHub | AWS
    </footer>

</div>

</body>
</html>
